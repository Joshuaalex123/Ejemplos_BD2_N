version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb_clase8
    restart: unless-stopped
    command: mongod --wiredTigerCacheSizeGB 0.25
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: tienda
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - mongo_net
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo_express_clase8
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    networks:
      - mongo_net
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m

volumes:
  mongo_data:

networks:
  mongo_net:
    driver: bridge
