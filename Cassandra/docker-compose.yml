services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra-demo
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=ClaseDemo
      - CASSANDRA_DC=datacenter1
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
      - CASSANDRA_USER=user
      - CASSANDRA_PASSWORD=contraseña123
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  cassandra_data:
